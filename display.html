<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ডিসপ্লে স্ক্রিন</title>
    <script src="https://cdn.pubnub.com/sdk/javascript/pubnub.7.2.2.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #222; color: white; padding: 20px; }
        /* চারকোনা বক্সের মূল ফ্রেম */
        .box-container {
            width: 320px;
            height: 320px;
            border: 4px solid #fff;
            margin: 40px auto;
            background-color: #fff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(255,255,255,0.3);
        }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <h2>ডিসপ্লে ফোন (ফোন ২)</h2>
    <p>কন্ট্রোল ফোনের সিগন্যালের অপেক্ষায়...</p>

    <div class="box-container">
        <iframe id="displayBox" src="about:blank"></iframe>
    </div>

    <script>
        const iframe = document.getElementById('displayBox');
        
        // আপনার স্ক্রিনশট থেকে পাওয়া সঠিক Keys এখানেও বসানো হয়েছে
        const pubnub = new PubNub({
            subscribeKey: "sub-c-9c560f6f-7bfe-44b6-99c7-2dc044dd5ab1",
            userId: "display-phone-user"
        });

        // বক্সের ভেতরের দৃশ্য পরিবর্তনের ফাংশন
        function updateBox(content) {
            let style = "display:flex; justify-content:center; align-items:center; height:100vh; margin:0; font-family:Arial; font-weight:bold; transition: background-color 0.3s;";
            
            if (content === 'Clear' || content === "" || content === null) {
                style += "background-color:white;"; 
                content = ""; 
            } else if (content === 'Red') { 
                style += "background-color:red; color:white; font-size:45px;"; 
            } else if (content === 'Green') { 
                style += "background-color:green; color:white; font-size:45px;"; 
            } else if (content === 'Big') { 
                style += "font-size:65px; color:#333; background-color:white;"; 
            } else if (content === 'Small') { 
                style += "font-size:18px; color:#666; background-color:white;"; 
            } else { 
                // যেকোনো সংখ্যার জন্য সুন্দর হালকা নীল ব্যাকগ্রাউন্ড ও বড় ফ্রন্ট
                style += "font-size:55px; color:#111; background-color:#e0f7fa; word-break: break-all; padding: 10px; text-align: center;"; 
            }

            // iframe-এর ভেতর লাইভ HTML তৈরি করা হচ্ছে
            iframe.srcdoc = `<body style="${style}"><div>${content}</div></body>`;
        }

        // কন্ট্রোল ফোন থেকে আসা মেসেজ শোনার লিসেনার
        pubnub.addListener({
            message: function(event) {
                if(event.message && event.message.displayValue !== undefined) {
                    updateBox(event.message.displayValue);
                }
            }
        });

        // নির্দিষ্ট চ্যানেলটি কানেক্ট করা
        pubnub.subscribe({ channels: ["remote_box_channel"] });
        
        // শুরুতে স্ক্রিন একদম সাদা এবং খালি রাখবে
        updateBox('Clear');
    </script>
</body>
</html>
