<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>রিমোট কন্ট্রোল প্যানেল</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #f4f4f4; padding: 20px; }
        .controls { margin: 15px 0; padding: 15px; background: #fff; display: inline-block; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        button { padding: 12px 20px; margin: 5px; font-size: 16px; cursor: pointer; border: 1px solid #ccc; background-color: #f9f9f9; border-radius: 4px; }
        .clear-btn { background-color: #ff4d4d; color: white; border: none; font-weight: bold; }
        input { padding: 10px; font-size: 16px; width: 120px; text-align: center; }
    </style>
</head>
<body>

    <h2>রিমোট কন্ট্রোল (ফোন ১)</h2>

    <div class="controls">
        <p><strong>লেখা পাঠান:</strong></p>
        <button onclick="sendData('Big')">Big</button>
        <button onclick="sendData('Small') font-size: 14px;">Small</button>
        <button onclick="sendData('Red')">Red</button>
        <button onclick="sendData('Green')">Green</button>
        <button class="clear-btn" onclick="sendData('Clear')">Clear (সাদা করুন)</button>
    </div>

    <br>

    <div class="controls">
        <p><strong>সংখ্যা পাঠান:</strong></p>
        <input type="number" id="numInput" placeholder="উদা: 197" oninput="sendNumber()">
    </div>

    <script>
        // ⚠️ আপনার ফায়ারবেস ডাটাবেজ লিংকটি নিচে বসান (শেষে /boxData.json অবশ্যই রাখবেন)
        const databaseURL = "https://YOUR_DATABASE_URL_HERE.firebaseio.com/boxData.json";

        // ডাটাবেজে তথ্য পাঠানোর ফাংশন
        function sendData(value) {
            fetch(databaseURL, {
                method: "PUT",
                body: JSON.stringify({ currentDisplay: value })
            })
            .then(response => console.log("পাঠানো হয়েছে:", value))
            .catch(error => console.error("Error:", error));
        }

        function sendNumber() {
            const val = document.getElementById('numInput').value;
            if(val !== "") {
                sendData(val);
            } else {
                sendData('Clear');
            }
        }
    </script>
</body>
</html>
